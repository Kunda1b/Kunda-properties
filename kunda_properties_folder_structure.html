
<style>
*{box-sizing:border-box;margin:0;padding:0}
.root{padding:10px 4px 16px}
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.tb-btn{font-size:11px;font-family:var(--font-sans);padding:3px 10px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer}

.desc{font-size:11px;font-family:var(--font-sans);color:var(--color-text-tertiary);margin-left:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}

const FILE_ICON = {
  '.ts':'ts', '.tsx':'tsx', '.json':'{}', '.yaml':'~', '.yml':'~',
  '.md':'¶', '.prisma':'◈', Dockerfile:'⊞', default:'·'
};

function fileIcon(name){
  if(name==='Dockerfile') return '⊞';
  const ext = name.match(/(\.[^.]+)$/)?.[1]||'';
  return FILE_ICON[ext]||FILE_ICON.default;
}

let activeLayer = null;
let openState = {};

function getPath(node, path){ return path ? path+'/'+node.name : node.name; }

function renderNode(node, depth, path){
  const fullPath = getPath(node, path);
  const isDir = node.type === 'dir';
  const id = 'n-'+fullPath.replace(/[^a-zA-Z0-9]/g,'-');
  const open = openState[fullPath] !== undefined ? openState[fullPath] : (node.open !== false && depth < 2);
  const layer = node.layer || null;
  const layerInfo = layer ? LAYERS[layer] : null;

  let html = `<div class="node" id="${id}" data-path="${fullPath}" data-layer="${layer||''}" style="transition:opacity .2s">`;
  html += `<div class="row" onclick="toggleNode('${fullPath}','${id}','${isDir}')"
    onmouseenter="showDetail('${fullPath}','${(node.desc||'').replace(/'/g,'&#39;')}')">`;

  html += `<span class="indent" style="width:${depth*14}px"></span>`;
  html += `<span class="toggle" id="tog-${id}">${isDir ? (open?'▾':'▸') : ''}</span>`;

  const fileTag = !isDir ? `<span style="font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);margin-right:5px">${fileIcon(node.name)}</span>` : '';
  html += `<span class="label ${isDir?'dir':''} ${depth===0?'root-label':''}">${fileTag}${node.name}</span>`;

  if(layerInfo && depth <= 1){
    html += `<span class="badge" style="background:${layerInfo.bg};color:${layerInfo.color};border:.5px solid ${layerInfo.border}">${layerInfo.label}</span>`;
  }
  if(node.desc && depth > 0){
    html += `<span class="desc">${node.desc}</span>`;
  }
  html += `</div>`;

  if(isDir && node.children){
    html += `<div class="children ${open?'':'hidden'}" id="ch-${id}">`;
    node.children.forEach(child => { html += renderNode(child, depth+1, fullPath); });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function toggleNode(path, id, isDir){
  if(isDir!=='true') return;
  const ch = document.getElementById('ch-'+id);
  const tog = document.getElementById('tog-'+id);
  if(!ch) return;
  const hidden = ch.classList.contains('hidden');
  ch.classList.toggle('hidden', !hidden);
  if(tog) tog.textContent = hidden ? '▾' : '▸';
  openState[path] = hidden;
}

let detailTimer = null;
function showDetail(path, desc){
  if(!desc) return;
  clearTimeout(detailTimer);
  detailTimer = setTimeout(() => {
    document.getElementById('db-path').textContent = path;
    document.getElementById('db-desc').textContent = desc;
    document.getElementById('detail-bar').classList.add('on');
  }, 100);
}

function expandAll(){
  document.querySelectorAll('.children').forEach(el => el.classList.remove('hidden'));
  document.querySelectorAll('[id^="tog-"]').forEach(el => { if(el.textContent==='▸') el.textContent='▾'; });
}
function collapseAll(){
  document.querySelectorAll('[id^="ch-"]').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('[id^="tog-"]').forEach(el => { if(el.textContent==='▾') el.textContent='▸'; });
}

function filterLayer(layer){
  activeLayer = activeLayer === layer ? null : layer;
  document.querySelectorAll('#pills .pill').forEach(p => {
    p.classList.toggle('off', !!activeLayer && p.dataset.layer !== activeLayer);
  });
  document.querySelectorAll('.node[data-layer]').forEach(n => {
    const nl = n.dataset.layer;
    n.style.opacity = (!activeLayer || nl === activeLayer || nl === '' || nl === 'shared') ? '1' : '0.15';
  });
}

function buildPills(){
  const pills = document.getElementById('pills');
  Object.entries(LAYERS).forEach(([key, val]) => {
    const p = document.createElement('span');
    p.className = 'pill';
    p.dataset.layer = key;
    p.textContent = val.label;
    p.style.cssText = `background:${val.bg};color:${val.color};border-color:${val.border}`;
    p.onclick = () => filterLayer(key);
    pills.appendChild(p);
  });
}

document.getElementById('tree').innerHTML = renderNode(TREE, 0, '');
