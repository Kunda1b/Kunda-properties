events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  sendfile on; tcp_nopush on; tcp_nodelay on; keepalive_timeout 65;
  gzip on; gzip_types text/plain text/css application/json application/javascript;

  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=admin:10m rate=30r/m;

  upstream web_app   { server web:3000; keepalive 32; }
  upstream admin_app { server admin:3001; keepalive 16; }
  upstream api_gw    { server gateway:4000; keepalive 32; }

  server {
    listen 80;
    server_name kundaproperties.gm www.kundaproperties.gm admin.kundaproperties.gm;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name kundaproperties.gm www.kundaproperties.gm;
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    client_max_body_size 50M;

    location /api/auth/ { limit_req zone=auth burst=5 nodelay; proxy_pass http://api_gw; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/      { limit_req zone=api burst=20 nodelay; proxy_pass http://api_gw; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 60s; }
    location /_next/static/ { proxy_pass http://web_app; add_header Cache-Control "public, max-age=31536000, immutable"; }
    location / { proxy_pass http://web_app; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 60s; }
  }

  server {
    listen 443 ssl http2;
    server_name admin.kundaproperties.gm;
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    # IP allowlist for admin — uncomment and set your office/VPN IPs in production
    # allow 1.2.3.4;
    # deny all;

    location /api/ { limit_req zone=admin burst=10 nodelay; proxy_pass http://api_gw; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location / { proxy_pass http://admin_app; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; }
  }
}
