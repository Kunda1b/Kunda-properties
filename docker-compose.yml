version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kunda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kunda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kunda_secret}
      POSTGRES_DB: ${POSTGRES_DB:-kunda_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: ["5432:5432"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kunda}"], interval: 10s, timeout: 5s, retries: 5 }

  redis:
    image: redis:7-alpine
    container_name: kunda_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes: ["redis_data:/data"]
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "--auth", "${REDIS_PASSWORD:-redis_secret}", "ping"], interval: 10s, timeout: 5s, retries: 5 }

  gateway:
    build: { context: ., dockerfile: services/gateway/Dockerfile }
    container_name: kunda_gateway
    restart: unless-stopped
    ports: ["4000:4000"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      AUTH_SERVICE_URL: http://auth:4001
      LISTINGS_SERVICE_URL: http://listings:4002
      ESCROW_SERVICE_URL: http://escrow:4003
      DOCUMENTS_SERVICE_URL: http://documents:4004
      NOTIFICATIONS_SERVICE_URL: http://notifications:4005
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on: { redis: { condition: service_healthy } }

  auth:
    build: { context: ., dockerfile: services/auth/Dockerfile }
    container_name: kunda_auth
    restart: unless-stopped
    ports: ["4001:4001"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER:-kunda}:${POSTGRES_PASSWORD:-kunda_secret}@postgres:5432/${POSTGRES_DB:-kunda_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SMILE_IDENTITY_PARTNER_ID: ${SMILE_IDENTITY_PARTNER_ID}
      SMILE_IDENTITY_API_KEY: ${SMILE_IDENTITY_API_KEY}
      SMILE_IDENTITY_ENVIRONMENT: ${SMILE_IDENTITY_ENVIRONMENT:-sandbox}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@kundaproperties.gm}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }

  listings:
    build: { context: ., dockerfile: services/listings/Dockerfile }
    container_name: kunda_listings
    restart: unless-stopped
    ports: ["4002:4002"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4002
      DATABASE_URL: postgresql://${POSTGRES_USER:-kunda}:${POSTGRES_PASSWORD:-kunda_secret}@postgres:5432/${POSTGRES_DB:-kunda_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }

  escrow:
    build: { context: ., dockerfile: services/escrow/Dockerfile }
    container_name: kunda_escrow
    restart: unless-stopped
    ports: ["4003:4003"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4003
      DATABASE_URL: postgresql://${POSTGRES_USER:-kunda}:${POSTGRES_PASSWORD:-kunda_secret}@postgres:5432/${POSTGRES_DB:-kunda_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }

  documents:
    build: { context: ., dockerfile: services/documents/Dockerfile }
    container_name: kunda_documents
    restart: unless-stopped
    ports: ["4004:4004"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4004
      DATABASE_URL: postgresql://${POSTGRES_USER:-kunda}:${POSTGRES_PASSWORD:-kunda_secret}@postgres:5432/${POSTGRES_DB:-kunda_db}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on: { postgres: { condition: service_healthy } }

  notifications:
    build: { context: ., dockerfile: services/notifications/Dockerfile }
    container_name: kunda_notifications
    restart: unless-stopped
    ports: ["4005:4005"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4005
      DATABASE_URL: postgresql://${POSTGRES_USER:-kunda}:${POSTGRES_PASSWORD:-kunda_secret}@postgres:5432/${POSTGRES_DB:-kunda_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@kundaproperties.gm}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }

  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    container_name: kunda_web
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    depends_on: [gateway]

  admin:
    build: { context: ., dockerfile: apps/admin/Dockerfile }
    container_name: kunda_admin
    restart: unless-stopped
    ports: ["3001:3001"]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on: [gateway]

  nginx:
    image: nginx:alpine
    container_name: kunda_nginx
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
    depends_on: [web, admin, gateway]

volumes:
  postgres_data:
  redis_data:

networks:
  default: { name: kunda_network }
